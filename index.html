<style>

.wrap{max-width:540px;margin:0 auto}.hdr{text-align:center;margin-bottom:28px}.hdr .eng{font-family:'Noto Sans TC',sans-serif;font-size:9px;letter-spacing:6px;color:var(--dim);margin-bottom:8px}.hdr h1{font-family:'DM Serif Display',serif;font-size:36px;letter-spacing:12px;color:var(--ink);font-style:italic;font-weight:400;margin-bottom:6px}.hdr .ln{width:36px;height:1px;background:var(--sage);margin:0 auto 8px}.hdr .sub{font-family:'Noto Sans TC',sans-serif;font-size:11px;color:var(--dim);letter-spacing:2px}.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:24px}.tab{flex:1;padding:10px 0;background:transparent;border:none;border-bottom:2px solid transparent;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--dim);cursor:pointer;transition:all .2s}.tab.active{color:var(--ink);border-bottom-color:var(--sage)}.view{display:none}.view.active{display:block;animation:fadeUp .4s ease}.sl{font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:4px;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:10px}.sl::after{content:'';flex:1;height:1px;background:var(--bd)}.zrow{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);margin-bottom:12px}.zbtn{padding:6px 10px;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:2px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}.zbtn.on{color:var(--ink);border-bottom-color:var(--sage)}.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:16px;border:1.5px solid var(--bd);background:white;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--dim);cursor:pointer;transition:all .18s;white-space:nowrap}.chip:hover{border-color:var(--sage);color:var(--sage)}.chip.sa{background:var(--sage);border-color:var(--sage);color:white}.chip.sk{background:var(--sky);border-color:var(--sky);color:white}.chip.ro{background:var(--rose);border-color:var(--rose);color:white}.chip.am{background:var(--amb);border-color:var(--amb);color:white}.chip.vi{background:var(--vio);border-color:var(--vio);color:white}.selbox{margin-bottom:20px;padding:10px 14px;background:rgba(107,138,114,.06);border:1px solid rgba(107,138,114,.15);border-radius:2px;display:none}.selbox .lbl{font-family:'Noto Sans TC',sans-serif;font-size:9px;letter-spacing:3px;color:var(--sage);margin-bottom:6px}.selitems{display:flex;flex-wrap:wrap;gap:6px}.selitem{font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--ink);cursor:pointer}.ci{width:100%;border:none;border-bottom:1.5px solid var(--bd);background:transparent;font-family:'Noto Serif SC',serif;font-size:14px;color:var(--ink);padding:10px 4px;outline:none;letter-spacing:1px;margin-bottom:24px}.ci::placeholder{color:#c4b49a}.ci:focus{border-bottom-color:var(--sage)}.introw{margin-bottom:28px}.intlbl{display:flex;justify-content:space-between;font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:10px}input[type=range]{width:100%;accent-color:var(--sage);cursor:pointer}.intends{display:flex;justify-content:space-between;font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--dim);margin-top:4px}.subbtn{width:100%;padding:15px;background:var(--ink);border:none;color:#f4ede0;font-family:'Noto Serif SC',serif;font-size:14px;letter-spacing:5px;cursor:pointer;transition:all .3s;border-radius:2px}.subbtn:hover:not(:disabled){background:#3a3020;letter-spacing:7px}.subbtn:disabled{opacity:.35;cursor:not-allowed}.subhint{text-align:center;margin-top:10px;font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--dim);letter-spacing:2px}.hhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.hst{display:flex;align-items:center;gap:6px}.hdot{width:6px;height:6px;border-radius:50%;background:var(--dim);transition:background .5s}.hdot.on{background:var(--sage)}.hinfo{font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--dim);letter-spacing:2px}.clrbtn{background:transparent;border:none;font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--dim);cursor:pointer}.hempty{text-align:center;padding:48px 0}.hempty p{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--dim);letter-spacing:3px}.hempty .s{font-size:10px;color:var(--bd);margin-top:8px;letter-spacing:2px}.hi{padding:14px 0;border-bottom:1px solid var(--bd)}.hitop{display:flex;justify-content:space-between;margin-bottom:5px}.hilocs{display:flex;gap:6px;flex-wrap:wrap;flex:1}.hiloc{font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--sage);letter-spacing:1px}.hisen{font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--dim);letter-spacing:1px}.hiright{display:flex;align-items:center;gap:10px;flex-shrink:0}.hidate{font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--dim)}.delbtn{background:transparent;border:none;color:var(--bd);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;transition:color .2s}.delbtn:hover{color:var(--rose)}.himsg{font-size:13px;color:var(--ink);letter-spacing:1px;line-height:1.7;margin-bottom:4px}.hifoot{display:flex;align-items:center;gap:5px;font-family:'Noto Sans TC',sans-serif;font-size:9px;color:var(--dim);letter-spacing:1px}.hinote{font-size:10px;color:var(--dim);font-style:italic}.loader{position:fixed;inset:0;background:rgba(247,244,239,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100;backdrop-filter:blur(4px)}.loader.on{display:flex}.hex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;max-height:280px;overflow-y:auto}.hex-btn{display:flex;flex-direction:column;align-items:center;padding:8px 4px;border:1.5px solid var(--bd);background:white;cursor:pointer;border-radius:2px;transition:all .15s;gap:2px}.hex-btn:hover{border-color:var(--sage)}.hex-btn.on{background:var(--sage);border-color:var(--sage);color:white}.hex-sym{font-size:16px;line-height:1}.hex-name{font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:1px}.hex-num{font-family:'Noto Sans TC',sans-serif;font-size:8px;opacity:.6}.hex-search{width:100%;border:none;border-bottom:1.5px solid var(--bd);background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--ink);padding:7px 4px;outline:none;letter-spacing:1px;margin-bottom:8px}.hex-search:focus{border-bottom-color:var(--sage)}.spinner{width:20px;height:20px;border-radius:50%;border:2px solid rgba(107,138,114,.3);border-top-color:var(--sage);animation:spin .8s linear infinite}.ltxt{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--dim);letter-spacing:4px}

  </div>
  <div class="view" id="vHistory"></div>
</div>

function saveConfig(){var t=document.getElementById("cfgToken").value.trim();var b=document.getElementById("cfgBase").value.trim()||DEFAULT_BASE;var table=document.getElementById("cfgTable").value.trim()||DEFAULT_TABLE;if(!t){alert("請填寫 Airtable Token");return;}localStorage.setItem(CFG_KEY,JSON.stringify({token:t,base:b,table:table}));document.getElementById("cfgBar").style.display="none";loadHist();}

var CTXS=["人","物","地","決定","思緒","夢境"];
var HEXAGRAMS=[{num:"1",n:"乾",s:"☰☰",nat:"天"},{num:"2",n:"坤",s:"☷☷",nat:"地"},{num:"3",n:"屯",s:"☵☳",nat:"水雷"},{num:"4",n:"蒙",s:"☶☵",nat:"山水"},{num:"5",n:"需",s:"☵☰",nat:"水天"},{num:"6",n:"訟",s:"☰☵",nat:"天水"},{num:"7",n:"師",s:"☷☵",nat:"地水"},{num:"8",n:"比",s:"☵☷",nat:"水地"},{num:"9",n:"小畜",s:"☴☰",nat:"風天"},{num:"10",n:"履",s:"☰☱",nat:"天澤"},{num:"11",n:"泰",s:"☷☰",nat:"地天"},{num:"12",n:"否",s:"☰☷",nat:"天地"},{num:"13",n:"同人",s:"☰☲",nat:"天火"},{num:"14",n:"大有",s:"☲☰",nat:"火天"},{num:"15",n:"謙",s:"☷☶",nat:"地山"},{num:"16",n:"豫",s:"☳☷",nat:"雷地"},{num:"17",n:"隨",s:"☱☳",nat:"澤雷"},{num:"18",n:"蠱",s:"☶☴",nat:"山風"},{num:"19",n:"臨",s:"☷☱",nat:"地澤"},{num:"20",n:"觀",s:"☴☷",nat:"風地"},{num:"21",n:"噬嗑",s:"☲☳",nat:"火雷"},{num:"22",n:"賁",s:"☶☲",nat:"山火"},{num:"23",n:"剝",s:"☶☷",nat:"山地"},{num:"24",n:"復",s:"☷☳",nat:"地雷"},{num:"25",n:"無妄",s:"☰☳",nat:"天雷"},{num:"26",n:"大畜",s:"☶☰",nat:"山天"},{num:"27",n:"頤",s:"☶☳",nat:"山雷"},{num:"28",n:"大過",s:"☱☴",nat:"澤風"},{num:"29",n:"坎",s:"☵☵",nat:"水水"},{num:"30",n:"離",s:"☲☲",nat:"火火"},{num:"31",n:"咸",s:"☱☶",nat:"澤山"},{num:"32",n:"恆",s:"☳☴",nat:"雷風"},{num:"33",n:"遯",s:"☰☶",nat:"天山"},{num:"34",n:"大壯",s:"☳☰",nat:"雷天"},{num:"35",n:"晉",s:"☲☷",nat:"火地"},{num:"36",n:"明夷",s:"☷☲",nat:"地火"},{num:"37",n:"家人",s:"☴☲",nat:"風火"},{num:"38",n:"睽",s:"☲☱",nat:"火澤"},{num:"39",n:"蹇",s:"☵☶",nat:"水山"},{num:"40",n:"解",s:"☳☵",nat:"雷水"},{num:"41",n:"損",s:"☶☱",nat:"山澤"},{num:"42",n:"益",s:"☴☳",nat:"風雷"},{num:"43",n:"夬",s:"☱☰",nat:"澤天"},{num:"44",n:"姤",s:"☰☴",nat:"天風"},{num:"45",n:"萃",s:"☱☷",nat:"澤地"},{num:"46",n:"升",s:"☷☴",nat:"地風"},{num:"47",n:"困",s:"☱☵",nat:"澤水"},{num:"48",n:"井",s:"☵☴",nat:"水風"},{num:"49",n:"革",s:"☱☲",nat:"澤火"},{num:"50",n:"鼎",s:"☲☴",nat:"火風"},{num:"51",n:"震",s:"☳☳",nat:"雷雷"},{num:"52",n:"艮",s:"☶☶",nat:"山山"},{num:"53",n:"漸",s:"☴☶",nat:"風山"},{num:"54",n:"歸妹",s:"☳☱",nat:"雷澤"},{num:"55",n:"豐",s:"☳☲",nat:"雷火"},{num:"56",n:"旅",s:"☲☶",nat:"火山"},{num:"57",n:"巽",s:"☴☴",nat:"風風"},{num:"58",n:"兌",s:"☱☱",nat:"澤澤"},{num:"59",n:"渙",s:"☴☵",nat:"風水"},{num:"60",n:"節",s:"☵☱",nat:"水澤"},{num:"61",n:"中孚",s:"☴☱",nat:"風澤"},{num:"62",n:"小過",s:"☳☶",nat:"雷山"},{num:"63",n:"既濟",s:"☵☲",nat:"水火"},{num:"64",n:"未濟",s:"☲☵",nat:"火水"}];

var selLocs=[],selSens=[],selCtx="",selHexId="",curZone="all",searchTerm="",hist=[],storageReady=false;

async function loadHist(){var at=getAT();if(!at){storageReady=true;renderHistory();return;}document.getElementById("loaderTxt").textContent="載入歷史記錄……";document.getElementById("loader").className="loader on";try{var res=await fetch(at.url+"?sort%5B0%5D%5Bfield%5D=日期&sort%5B0%5D%5Bdirection%5D=desc&maxRecords=200",{headers:at.h});var d=await res.json();if(d.error){throw new Error(d.error.message||"Airtable 載入失敗");}hist=(d.records||[]).map(function(r){return{_id:r.id,locs:(r.fields["部位"]||"").split("、").filter(Boolean),sens:(r.fields["感覺"]||"").split("、").filter(Boolean),ctx:r.fields["對象"]||"",note:r.fields["情境"]||"",intensity:r.fields["強度"]||3,hex:r.fields["卦象"]||"",time:new Date(r.fields["日期"]||r.createdTime)}});}catch(e){alert("Airtable 載入失敗："+e.message);}storageReady=true;document.getElementById("loader").className="loader";renderHistory();}
async function saveEntry(entry){var at=getAT();if(!at){alert("請先到右上角 ⚙ 設定 Airtable Token");return false;}try{var res=await fetch(at.url,{method:"POST",headers:at.h,body:JSON.stringify({fields:{"Name":entry.time.toLocaleDateString("zh-TW")+" "+entry.locs.join("・"),"部位":entry.locs.join("、"),"感覺":entry.sens.join("、"),"對象":entry.ctx||"","情境":entry.note||"","強度":entry.intensity,"卦象":entry.hex||"","日期":entry.time.toISOString()}})});var d=await res.json();if(d.error){throw new Error(d.error.message||"Airtable 儲存失敗");}if(d.id)entry._id=d.id;return true;}catch(e){alert("Airtable 儲存失敗："+e.message);return false;}}
async function delRecord(id){var at=getAT();if(!at||!id)return;try{await fetch(at.url+"/"+id,{method:"DELETE",headers:at.h});}catch(e){alert("Airtable 刪除失敗："+e.message);}}

function exportData(){if(hist.length===0){alert("目前沒有記錄可以匯出");return;}var data=JSON.stringify(hist.map(function(h){return Object.assign({},h,{time:h.time instanceof Date?h.time.toISOString():h.time});}),null,2);var blob=new Blob([data],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="身體的訊息備份_"+new Date().toLocaleDateString("zh-TW").replace(/\//g,"-")+".json";a.click();URL.revokeObjectURL(url);}
function importData(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=async function(e){try{var data=JSON.parse(e.target.result);if(!Array.isArray(data)){alert("格式錯誤");return;}var imported=data.map(function(h){return Object.assign({},h,{time:new Date(h.time)});});for(var i=0;i<imported.length;i++){await saveEntry(imported[i]);}await loadHist();alert("匯入完成");}catch(err){alert("匯入失敗："+err.message);}input.value="";};reader.readAsText(file);}

function renderZones(){document.getElementById("zRow").innerHTML=ZONES.map(function(z){return '<button class="zbtn'+(z.id===curZone?' on':'')+'" onclick="setZone(\''+z.id+'\')">'+z.l+'</button>';}).join("");}
function searchPts(v){searchTerm=v.trim();renderChips();}
function renderChips(){var filtered=curZone==="all"?PTS:PTS.filter(function(p){return p.z===curZone;});if(searchTerm)filtered=filtered.filter(function(p){return p.n.indexOf(searchTerm)>=0||p.id.indexOf(searchTerm)>=0||p.s.indexOf(searchTerm)>=0;});document.getElementById("pChips").innerHTML=filtered.map(function(p){var on=selLocs.indexOf(p.id)>=0;return '<button class="chip'+(on?' '+p.c:'')+'" title="'+p.tip.replace(/"/g,"&quot;")+'" data-id="'+encodeURIComponent(p.id)+'" onclick="chipClick(this)"><span>'+p.id+'</span></button>';}).join("");}
function chipClick(btn){toggleLoc(decodeURIComponent(btn.dataset.id));}
function renderSens(){document.getElementById("sChips").innerHTML=SENS.map(function(s){var on=selSens.indexOf(s.id)>=0;return '<button class="chip'+(on?' sa':'')+'" data-sid="'+encodeURIComponent(s.id)+'" onclick="senClick(this)"><span style="font-size:12px">'+s.e+'</span><span>'+s.id+'</span></button>';}).join("");}
function senClick(btn){toggleSen(decodeURIComponent(btn.dataset.sid));}
function renderCtxs(){document.getElementById("cChips").innerHTML=CTXS.map(function(c){var on=selCtx===c;return '<button class="chip'+(on?' am':'')+'" data-cid="'+encodeURIComponent(c)+'" onclick="ctxClick(this)">'+c+'</button>';}).join("");}
function ctxClick(btn){var id=decodeURIComponent(btn.dataset.cid);selCtx=selCtx===id?"":id;renderCtxs();}
function renderSelBox(){var box=document.getElementById("selBox");if(selLocs.length===0){box.style.display="none";return;}box.style.display="block";document.getElementById("selItems").innerHTML=selLocs.map(function(id){var p=PTS.find(function(x){return x.id===id;});return p?'<span class="selitem" data-sid="'+encodeURIComponent(id)+'" onclick="selClick(this)">'+p.n+'×</span>':'';}).join("");}
function selClick(btn){toggleLoc(decodeURIComponent(btn.dataset.sid));}
function updateBtn(){var ok=selLocs.length>0&&selSens.length>0;document.getElementById("subBtn").disabled=!ok;document.getElementById("subHint").style.display=ok?"none":"block";document.getElementById("hSub").textContent=selLocs.length>0?"已選 "+selLocs.length+" 個部位":"記錄感應 · 整理頻率 · 找回清明";}
function toggleLoc(id){var i=selLocs.indexOf(id);if(i>=0)selLocs.splice(i,1);else selLocs.push(id);renderChips();renderSelBox();updateBtn();}
function toggleSen(id){var i=selSens.indexOf(id);if(i>=0)selSens.splice(i,1);else selSens.push(id);renderSens();updateBtn();}
function setZone(z){curZone=z;renderZones();renderChips();}
function updateInt(v){document.getElementById("intV").textContent="●".repeat(v)+"○".repeat(5-v);}

function renderHexGrid(search){var term=(search||"").trim();var filtered=term?HEXAGRAMS.filter(function(h){return h.n.indexOf(term)>=0||h.num===term||h.nat.indexOf(term)>=0;}):HEXAGRAMS;document.getElementById("hexGrid").innerHTML=filtered.map(function(h){var on=selHexId===h.num;return '<button class="hex-btn'+(on?' on':'')+'" data-hid="'+h.num+'" onclick="selHex(this.dataset.hid)"><span class="hex-sym">'+h.s+'</span><span class="hex-name">'+h.n+'</span><span class="hex-num">'+h.num+'</span></button>';}).join("");}
function selHex(num){selHexId=num;renderHexGrid(document.getElementById("hexSearch").value);var box=document.getElementById("hexSelected");if(num){var h=HEXAGRAMS.find(function(x){return x.num===num;});if(h){document.getElementById("hexSelectedLabel").textContent=h.s+" 第"+h.num+"卦 "+h.n+"（"+h.nat+"）";box.style.display="block";}}else{box.style.display="none";}}
function getHexLabel(num){if(!num)return"";var h=HEXAGRAMS.find(function(x){return x.num===String(num);});return h?h.nat+h.n+"（第"+h.num+"卦）":num;}

async function doSubmit(){if(selLocs.length===0||selSens.length===0)return;document.getElementById("loaderTxt").textContent="記錄中……";document.getElementById("loader").className="loader on";var entry={locs:[].concat(selLocs),sens:[].concat(selSens),ctx:selCtx,note:document.getElementById("noteIn").value,intensity:+document.getElementById("intSlider").value,hex:selHexId,time:new Date()};var ok=await saveEntry(entry);document.getElementById("loader").className="loader";if(ok){hist.unshift(entry);resetForm(false);showView("history");}}
function renderHistory(){var at=getAT();var dotCls=storageReady&&at?"on":"";var infoTxt=!at?'<span style="color:var(--amb)">⚙ 尚未設定 Airtable Token</span>':storageReady?"Airtable 已連線 · "+hist.length+" 筆":"連線中…";var clrBtn='<div style="display:flex;gap:10px;align-items:center"><button class="clrbtn" onclick="exportData()">匯出備份</button><button class="clrbtn" onclick="document.getElementById(\'importFile\').click()">匯入備份</button>'+(hist.length>0?'<button class="clrbtn" style="color:var(--rose)" onclick="clearAll()">清空</button>':'')+'</div><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">';var items=hist.length===0?'<div class="hempty"><p>尚無記錄</p><p class="s">'+(at?'完成記錄後自動儲存至 Airtable':'請先點右上角 ⚙ 設定 Airtable')+'</p></div>':hist.map(function(h,i){var lspans=h.locs.map(function(l){var p=PTS.find(function(x){return x.id===l;});return '<span class="hiloc">'+(p?p.n:l)+'</span>';}).join("");var sspans=h.sens.map(function(s){return '<span class="hisen">'+s+'</span>';}).join("");var dt=h.time instanceof Date?h.time.toLocaleDateString("zh-TW")+" "+h.time.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}):"";var hex=getHexLabel(h.hex);var foot=[h.ctx?"對象："+h.ctx:"",hex?"卦象："+hex:"","強度："+h.intensity].filter(Boolean).join(" · ");return '<div class="hi"><div class="hitop"><div class="hilocs">'+lspans+'<span style="color:var(--bd)">·</span>'+sspans+'</div><div class="hiright"><span class="hidate">'+dt+'</span><button class="delbtn" onclick="delEntry('+i+')">×</button></div></div><div class="himsg">'+(h.note||"未填寫情境")+'</div><div class="hifoot">'+foot+'</div></div>';}).join("");document.getElementById("vHistory").innerHTML='<div class="hhdr"><div class="hst"><div class="hdot '+dotCls+'"></div><span class="hinfo">'+infoTxt+'</span></div>'+clrBtn+'</div>'+items;}
async function delEntry(i){var h=hist[i];if(!h)return;if(!confirm("刪除這筆記錄？"))return;if(h._id)await delRecord(h._id);hist.splice(i,1);renderHistory();}
async function clearAll(){if(!confirm("確定清空所有記錄？這會刪除 Airtable 內的資料。"))return;document.getElementById("loaderTxt").textContent="清空中……";document.getElementById("loader").className="loader on";for(var i=0;i<hist.length;i++){if(hist[i]._id)await delRecord(hist[i]._id);}hist=[];document.getElementById("loader").className="loader";renderHistory();}
function resetForm(goForm){selLocs=[];selSens=[];selCtx="";selHexId="";document.getElementById("noteIn").value="";document.getElementById("hexSearch").value="";document.getElementById("intSlider").value=3;document.getElementById("intV").textContent="●●●○○";document.getElementById("hexSelected").style.display="none";renderChips();renderSens();renderCtxs();renderHexGrid("");renderSelBox();updateBtn();if(goForm!==false)showView("form");}
function showView(v){["form","history"].forEach(function(k){var el=document.getElementById("v"+k.charAt(0).toUpperCase()+k.slice(1));if(el)el.className="view"+(k===v?" active":"");});var tabs=document.querySelectorAll(".tab");var idx={form:0,history:1}[v];if(idx!==undefined)tabs.forEach(function(t,i){t.className="tab"+(i===idx?" active":"")});if(v==="history")renderHistory();}
function init(){var cfg=loadConfig();if(!cfg.base)localStorage.setItem(CFG_KEY,JSON.stringify(Object.assign({base:DEFAULT_BASE,table:DEFAULT_TABLE},cfg)));renderZones();renderChips();renderSens();renderCtxs();renderHexGrid("");loadHist();}
init();
</script>
</body>
</html>
